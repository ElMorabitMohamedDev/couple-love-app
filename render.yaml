services:
  - type: web
    name: mobile-romantic-couple-api
    runtime: docker
    plan: free
    dockerContext: .
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    autoDeployTrigger: commit
    preDeployCommand: php artisan migrate --force
    envVars:
      - key: APP_NAME
        value: Our Love Space API
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        sync: false
      - key: APP_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: DB_URL
        sync: false
      - key: FILESYSTEM_DISK
        value: public
      - key: CACHE_STORE
        value: database
      - key: SESSION_DRIVER
        value: database
